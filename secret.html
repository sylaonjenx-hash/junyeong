<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Junyeong</title>

  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

  <style>
    body{
      font-family: "Georgia", serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(#fffaf5, #ffeef2);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
      box-sizing: border-box;
    }

    .container{
      max-width: 850px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    h1{
      font-size: 2.4rem;
      margin-bottom: 20px;
    }

    p{
      font-size: 1.05rem;
      line-height: 1.9;
      white-space: pre-line;
    }

    img{
      width: 320px;
      max-width: 90%;
      margin: 24px 0;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    video{
      width: 360px;
      max-width: 90%;
      margin-top: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .final-line{
      margin-top: 28px;
      font-style: italic;
      color: #6b4f5f;
    }

    @keyframes fadeIn{
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="typing"></h1>

    <p>
수료 축하해.
그동안 정말 고생 많았어.
    </p>

    <img src="photo1.jpg" alt="photo">

    <video controls>
      <source src="video.mp4" type="video/mp4">
      브라우저가 영상을 지원하지 않습니다.
    </video>

    <p class="final-line">
      이 페이지는 네가 찾은 꽃 세 송이가 열어준 거야.
    </p>
  </div>

  <script>
    new Typed('#typing', {
      strings: [
        "준영에게",
        "훈련소 수료 축하해.",
        "그동안 정말 고생 많았어."
      ],
      typeSpeed: 60,
      backSpeed: 0,
      showCursor: false
    });
  </script>
</body>
</html>
