<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Junyeong</title>

  <style>
    body{
      font-family: "Georgia", serif;
      text-align: center;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(#fffaf5, #ffeef2);
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .container{
      max-width: 800px;
      width: 100%;
    }

    h1{
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    p{
      font-size: 1rem;
      line-height: 1.8;
    }

    input{
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 220px;
      max-width: 80%;
      margin-right: 8px;
    }

    button{
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #f5a9b8;
      color: white;
      cursor: pointer;
    }

    button:hover{
      background: #f28ea6;
    }

    .error{
      color: #c85c5c;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>꽃 세 송이가 이 페이지를 열어줄 거야</h1>
    <p>password</p>

    <div>
      <input id="pw" type="password" placeholder="비밀번호 입력">
      <button onclick="check()">enter</button>
    </div>

    <p id="error" class="error">비밀번호가 맞지 않아.</p>
  </div>

  <script>
    function check(){
      const pw = document.getElementById("pw").value.trim();
      const error = document.getElementById("error");

      if(pw === "TDM20260407"){
        window.location.href = "secret.html";
      } else {
        error.style.display = "block";
      }
    }
  </script>
</body>
</html>
